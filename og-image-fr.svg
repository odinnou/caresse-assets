<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9F7FD"/>
      <stop offset="100%" stop-color="#E9DFF5"/>
    </linearGradient>
    <radialGradient id="halo1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9361FD" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#9361FD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9E7BB5" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#9E7BB5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F4EEFA"/>
      <stop offset="100%" stop-color="#E5D5F0"/>
    </linearGradient>
    <filter id="phoneShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="24" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.4"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="phoneClip">
      <rect x="0" y="0" width="320" height="660" rx="42" ry="42"/>
    </clipPath>
    <!-- Soft glow around bubbles inside phone -->
    <radialGradient id="bubbleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9361FD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9361FD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background gradient -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Ambient halos -->
  <circle cx="180" cy="100" r="340" fill="url(#halo1)"/>
  <circle cx="1080" cy="560" r="400" fill="url(#halo2)"/>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- LEFT SIDE — official logo + tagline                 -->
  <!-- ════════════════════════════════════════════════════ -->

  <!-- Official Caresse logo, embedded directly (viewBox 0 0 250 80, scaled 2.4x → 600×192) -->
  <image href="caresse-logo.svg" x="60" y="90" width="600" height="192"/>

  <!-- Headline -->
  <text x="80" y="365" font-family="'Comfortaa', Georgia, system-ui, sans-serif" font-weight="700" font-size="54" fill="#2D1B4E" letter-spacing="-0.5">
    <tspan x="80" dy="0">Expérience audio</tspan>
    <tspan x="80" dy="66">intime guidée</tspan>
    <tspan x="80" dy="66">par l'IA.</tspan>
  </text>

  <!-- Accent line + platforms -->
  <line x1="80" y1="560" x2="180" y2="560" stroke="#5D3D8C" stroke-width="3" stroke-linecap="round"/>
  <text x="80" y="600" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="22" fill="#5D3D8C" letter-spacing="1">iOS  ·  ANDROID</text>

  <!-- ════════════════════════════════════════════════════ -->
  <!-- RIGHT SIDE — phone mockup, tilted -8deg              -->
  <!-- ════════════════════════════════════════════════════ -->

  <g transform="translate(820, 40) rotate(-8 160 340)" filter="url(#phoneShadow)">
    <!-- Phone outer frame -->
    <rect x="-14" y="-14" width="348" height="688" rx="56" ry="56" fill="#1a1530"/>
    <rect x="-6" y="-6" width="332" height="672" rx="48" ry="48" fill="#0a0418"/>

    <!-- Screen content (clipped) -->
    <g clip-path="url(#phoneClip)">
      <!-- Soft gradient screen background -->
      <rect x="0" y="0" width="320" height="660" fill="url(#screenGrad)"/>

      <!-- Ambient blurry shapes (matching app aesthetic) -->
      <ellipse cx="180" cy="180" rx="140" ry="170" fill="#C9B6E0" opacity="0.4"/>
      <ellipse cx="80" cy="540" rx="90" ry="110" fill="#D4C2E8" opacity="0.5"/>

      <!-- Status bar mock -->
      <text x="22" y="40" font-family="system-ui, sans-serif" font-size="15" font-weight="600" fill="#1a1530">12:39</text>
      <g transform="translate(248, 28)" fill="#1a1530">
        <rect x="0" y="4" width="3" height="8" rx="1"/>
        <rect x="5" y="2" width="3" height="10" rx="1"/>
        <rect x="10" y="0" width="3" height="12" rx="1"/>
        <circle cx="22" cy="6" r="5" fill="none" stroke="#1a1530" stroke-width="1.5"/>
        <rect x="36" y="2" width="22" height="10" rx="2" fill="none" stroke="#1a1530" stroke-width="1.2"/>
        <rect x="38" y="4" width="14" height="6" rx="1"/>
      </g>

      <!-- Audio waves emanating from the bubbles, left and right -->
      <g transform="translate(160, 250)" stroke="#5D3D8C" fill="none" stroke-linecap="round">
        <!-- Left side waves -->
        <path d="M -115,-30 Q -130,0 -115,30" stroke-width="2.5" opacity="0.55"/>
        <path d="M -135,-50 Q -155,0 -135,50" stroke-width="2.5" opacity="0.35"/>
        <path d="M -155,-70 Q -180,0 -155,70" stroke-width="2.5" opacity="0.2"/>
        <!-- Right side waves -->
        <path d="M 115,-30 Q 130,0 115,30" stroke-width="2.5" opacity="0.55"/>
        <path d="M 135,-50 Q 155,0 135,50" stroke-width="2.5" opacity="0.35"/>
        <path d="M 155,-70 Q 180,0 155,70" stroke-width="2.5" opacity="0.2"/>
      </g>

      <!-- Glow behind bubbles -->
      <circle cx="160" cy="250" r="140" fill="url(#bubbleGlow)"/>

      <!-- The iconic Caresse bubbles, large and centered, exact same geometry as the official logo -->
      <g transform="translate(160, 250) scale(3.5) translate(-44, -38)">
        <ellipse cx="32" cy="40" rx="20" ry="25" fill="#5D3D8C" opacity="0.95" transform="rotate(-25 32 40)"/>
        <ellipse cx="28" cy="35" rx="2" ry="3.5" fill="#9E7BB5" transform="rotate(-25 28 35)"/>
        <ellipse cx="36" cy="35" rx="2" ry="3.5" fill="#9E7BB5" transform="rotate(-25 36 35)"/>
        <ellipse cx="57" cy="37" rx="22" ry="28" fill="#9E7BB5" opacity="0.75" transform="rotate(15 57 37)"/>
        <ellipse cx="53" cy="31" rx="2" ry="3.5" fill="#5D3D8C" transform="rotate(15 53 31)"/>
        <ellipse cx="61" cy="31" rx="2" ry="3.5" fill="#5D3D8C" transform="rotate(15 61 31)"/>
      </g>

      <!-- "La promesse" title under bubbles -->
      <text x="160" y="450" text-anchor="middle" font-family="'Comfortaa', system-ui, sans-serif" font-weight="700" font-size="26" fill="#5D3D8C">La promesse</text>

      <!-- Subtext -->
      <text x="160" y="490" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#3a2a5c" opacity="0.85">Et si vos instants intimes</text>
      <text x="160" y="510" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#3a2a5c" opacity="0.85">devenaient inoubliables ?</text>
    </g>
  </g>
</svg>
